name: Update VPN Config

on:
  schedule:
    - cron: '0 */4 * * *' # Запуск каждые 4 часа
  workflow_dispatch: # Позволяет запускать скрипт вручную

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and clean VPN config
        run: |
          # Скачиваем оригинальный файл (ссылка на raw-версию)
          curl -s https://githubusercontent.com | tail -n +7 > vless_clean.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add vless_clean.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update VPN config without first 6 lines" && git push)
